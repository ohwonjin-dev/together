<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>모임록</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Segoe UI',sans-serif;background:#0A0A0A;color:#FFFFFF;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:#0A0A0A;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading-spinner{width:36px;height:36px;border:3px solid #2C2C2E;border-top-color:#FF6A00;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:#636366}

/* HOME HEADER */
.home-header{padding:56px 20px 28px;background:#0A0A0A;color:white;border-bottom:1px solid #1C1C1E}
.home-header-title{font-size:28px;font-weight:800;letter-spacing:-0.5px;color:#FFFFFF}
.home-header-sub{font-size:14px;color:#636366;margin-top:4px}

/* SIMPLE HEADER */
.simple-header{padding:0;background:#0A0A0A;display:flex;align-items:stretch;border-bottom:1px solid #1C1C1E;position:sticky;top:0;z-index:100}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:16px 12px 16px 16px;color:#FFFFFF;display:flex;align-items:center}
.simple-header-title{font-size:18px;font-weight:700;flex:1;display:flex;align-items:center;color:#FFFFFF}
.header-action-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:16px;color:#FFFFFF;display:flex;align-items:center}

/* CONTENT */
.content{flex:1;padding:20px;overflow-y:auto}

/* FAB */
.fab{position:fixed;bottom:24px;right:calc(50% - 215px + 24px);width:56px;height:56px;border-radius:50%;background:#FF6A00;color:white;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(255,106,0,.45);display:flex;align-items:center;justify-content:center;transition:transform .2s;z-index:90}
.fab:active{transform:scale(.95)}
@media(max-width:430px){.fab{right:24px}}

/* GATHERING CARD */
.gathering-card{background:#1C1C1E;border-radius:16px;overflow:hidden;border:1px solid #2C2C2E;margin-bottom:12px;cursor:pointer;transition:transform .15s}
.gathering-card:active{transform:scale(.98)}
.gc-cover{height:156px;background:#1A1A2E;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.gc-cover img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.gc-cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent,rgba(0,0,0,.5))}
.gc-body{padding:14px 16px}
.gc-title{font-size:17px;font-weight:700;margin-bottom:6px;color:#FFFFFF}
.gc-meta{font-size:12px;color:#636366;display:flex;gap:12px;flex-wrap:wrap}

/* GATHERING DETAIL HEADER */
.gd-header{position:relative;height:200px;background:#141414;overflow:hidden;flex-shrink:0}
.gd-header img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.gd-header-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.3),rgba(0,0,0,.7))}
.gd-header-back{position:absolute;top:16px;left:16px;width:36px;height:36px;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:50%;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gd-header-actions{position:absolute;top:16px;right:16px;display:flex;gap:8px}
.gd-header-btn{width:36px;height:36px;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15);border-radius:50%;color:white;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gd-header-content{position:absolute;bottom:0;left:0;right:0;padding:16px 20px 18px;color:white}
.gd-header-title{font-size:22px;font-weight:800}
.gd-header-meta{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px}
.gd-header-emoji{font-size:52px;z-index:1;position:relative}

/* TABS */
.tab-bar{display:flex;background:#0A0A0A;border-bottom:1px solid #2C2C2E;position:sticky;top:0;z-index:90;flex-shrink:0}
.tab-btn{flex:1;padding:14px;border:none;background:none;font-size:14px;font-weight:600;color:#636366;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;font-family:inherit}
.tab-btn.active{color:#FF6A00;border-bottom-color:#FF6A00}
.tab-content{display:none}
.tab-content.active{display:block}

/* TIMELINE */
.timeline{padding:4px 0}
.tl-item{display:flex;gap:14px;margin-bottom:4px}
.tl-left{display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0}
.tl-time{font-size:11px;font-weight:700;color:#FF6A00;white-space:nowrap}
.tl-dot{width:13px;height:13px;border-radius:50%;background:#FF6A00;border:2.5px solid #0A0A0A;box-shadow:0 0 0 2px #FF6A00;margin:5px 0;flex-shrink:0}
.tl-line{flex:1;width:2px;background:linear-gradient(to bottom,#2C2C2E 60%,transparent);min-height:24px}
.tl-card{flex:1;background:#1C1C1E;border-radius:14px;padding:14px;border:1px solid #2C2C2E;margin-bottom:14px}
.tl-location{font-size:12px;color:#FF6A00;font-weight:700;display:flex;align-items:center;gap:4px;margin-bottom:6px}
.tl-memo{font-size:14px;color:#AEAEB2;line-height:1.6}
.tl-photos{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:4px}
.tl-photo{width:80px;height:80px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:pointer}
.tl-footer{margin-top:10px;display:flex;justify-content:flex-end}
.del-btn{background:none;border:none;font-size:15px;cursor:pointer;padding:4px;color:#FF453A;opacity:.7}
.del-btn:hover{opacity:1}

/* SETTLEMENT */
.total-card{background:#1C1C1E;border-radius:16px;padding:22px;border:1px solid #2C2C2E;margin-bottom:24px}
.total-label{font-size:12px;color:#636366;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.total-amount{font-size:34px;font-weight:800;color:#FFFFFF}
.total-per{font-size:14px;color:#FF6A00;margin-top:6px;font-weight:600}
.section-title{font-size:11px;font-weight:700;color:#48484A;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.expense-item{background:#1C1C1E;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border:1px solid #2C2C2E}
.exp-title{font-size:15px;font-weight:600;margin-bottom:3px;color:#FFFFFF}
.exp-meta{font-size:12px;color:#636366}
.exp-amount{font-size:16px;font-weight:700;color:#FF6A00}
.balance-card{background:#1C1C1E;border-radius:14px;padding:14px 16px;border:1px solid #2C2C2E}
.member-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #2C2C2E}
.member-row:last-child{border-bottom:none}
.member-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.bal-pos{color:#34C759;font-weight:700}
.bal-neg{color:#FF453A;font-weight:700}
.bal-zero{color:#48484A;font-weight:600}
.transfer-card{background:#1C1C1E;border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1px solid #2C2C2E}
.transfer-amount{font-size:17px;font-weight:700;color:#FF6A00;white-space:nowrap}
.section-mb{margin-bottom:20px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-sheet{background:#1C1C1E;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease;border-top:1px solid #3A3A3C}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:#3A3A3C;border-radius:2px;margin:0 auto 20px}
.modal-title{font-size:20px;font-weight:800;margin-bottom:20px;color:#FFFFFF}

/* FORM */
.form-group{margin-bottom:16px}
.form-label{font-size:12px;font-weight:600;color:#636366;margin-bottom:8px;display:block;text-transform:uppercase;letter-spacing:.3px}
.form-input{width:100%;padding:12px 14px;border:1px solid #3A3A3C;border-radius:12px;font-size:15px;color:#FFFFFF;font-family:inherit;outline:none;transition:border-color .2s;background:#2C2C2E}
.form-input:focus{border-color:#FF6A00}
textarea.form-input{resize:none}

/* EMOJI GRID */
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.emoji-opt{width:44px;height:44px;border-radius:12px;border:1px solid #3A3A3C;background:#2C2C2E;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .15s}
.emoji-opt.selected{border-color:#FF6A00;background:rgba(47,110,245,.15)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid #3A3A3C;background:#2C2C2E;color:#AEAEB2;cursor:pointer;transition:all .15s;font-family:inherit}
.chip.selected{background:#FF6A00;color:white;border-color:#FF6A00}

/* RADIO */
.radio-group{display:flex;flex-direction:column;gap:8px}
.radio-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1px solid #3A3A3C;border-radius:12px;cursor:pointer;transition:all .15s;background:#2C2C2E}
.radio-opt.selected{border-color:#FF6A00;background:rgba(47,110,245,.1)}
.radio-dot{width:18px;height:18px;border-radius:50%;border:2px solid #48484A;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.radio-opt.selected .radio-dot{border-color:#FF6A00;background:#FF6A00}
.radio-opt.selected .radio-dot::after{content:'';width:6px;height:6px;background:white;border-radius:50%;display:block}

/* BUTTONS */
.btn-primary{width:100%;padding:16px;background:#FF6A00;color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s;font-family:inherit;margin-top:8px}
.btn-primary:active{opacity:.85}

/* PHOTO UPLOAD */
.photo-upload{border:1.5px dashed #3A3A3C;border-radius:12px;padding:18px;text-align:center;cursor:pointer;color:#FF6A00;font-size:14px;font-weight:600;background:#161616;display:block}
.photo-previews{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.photo-preview-wrap{position:relative}
.photo-preview-wrap img{width:76px;height:76px;object-fit:cover;border-radius:10px;display:block}
.photo-remove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:#FF453A;color:white;border:none;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:#48484A}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:700;margin-bottom:6px;color:#636366}
.empty-desc{font-size:13px;line-height:1.5}

/* PHOTO VIEWER */
.photo-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:300;align-items:center;justify-content:center}
.photo-viewer.active{display:flex}
.photo-viewer img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:8px}
.photo-viewer-close{position:absolute;top:20px;right:20px;background:none;border:none;color:white;font-size:28px;cursor:pointer}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1C1C1E;color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;border:1px solid #3A3A3C;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-spinner"></div>
  <div class="loading-text">모임록 불러오는 중…</div>
</div>

<!-- ===== HOME ===== -->
<div id="screen-home" class="screen">
  <div class="home-header">
    <div class="home-header-title">모임록 📸</div>
    <div class="home-header-sub">소중한 순간을 기록하고 정산까지</div>
  </div>
  <div class="content" id="gathering-list"></div>
  <button class="fab" onclick="openNewGathering()" title="새 모임">＋</button>
</div>

<!-- ===== GATHERING DETAIL ===== -->
<div id="screen-gathering" class="screen">
  <div class="gd-header" id="gd-header">
    <img id="gd-cover-img" src="" style="display:none">
    <div class="gd-header-overlay"></div>
    <button class="gd-header-back" onclick="showHome()">←</button>
    <div class="gd-header-actions">
      <button class="gd-header-btn" onclick="shareGathering()" title="링크 공유">🔗</button>
      <button class="gd-header-btn" onclick="deleteGathering()" title="모임 삭제">🗑</button>
    </div>
    <div class="gd-header-content">
      <div id="gd-emoji" class="gd-header-emoji"></div>
      <div id="gd-title" class="gd-header-title"></div>
      <div id="gd-meta" class="gd-header-meta"></div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-btn-timeline" onclick="switchTab('timeline')">🗺 타임라인</button>
    <button class="tab-btn" id="tab-btn-settlement" onclick="switchTab('settlement')">💰 정산</button>
  </div>
  <div class="content" style="padding-bottom:80px">
    <div id="tab-timeline" class="tab-content active" style="padding-top:4px"></div>
    <div id="tab-settlement" class="tab-content"></div>
  </div>
  <button class="fab" id="gathering-fab" onclick="fabAction()">＋</button>
</div>

<!-- ===== MODAL: NEW GATHERING ===== -->
<div class="modal-overlay" id="modal-new-gathering" onclick="handleOverlayClick(event,'modal-new-gathering')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">새 모임 만들기</div>
    <div class="form-group">
      <label class="form-label">모임 이름 *</label>
      <input class="form-input" id="ng-title" placeholder="예: 제주도 여행, 홍대 생일파티..." maxlength="40">
    </div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <input class="form-input" id="ng-date" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">멤버 (쉼표로 구분)</label>
      <input class="form-input" id="ng-members" placeholder="예: 민준, 서연, 준혁, 지우">
    </div>
    <div class="form-group">
      <label class="form-label">커버 이모지</label>
      <div class="emoji-grid" id="ng-emoji-grid"></div>
    </div>
    <button class="btn-primary" onclick="saveNewGathering()">모임 만들기</button>
  </div>
</div>

<!-- ===== MODAL: ADD ACTIVITY ===== -->
<div class="modal-overlay" id="modal-add-activity" onclick="handleOverlayClick(event,'modal-add-activity')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">활동 기록 추가</div>
    <div class="form-group">
      <label class="form-label">시간</label>
      <input class="form-input" id="act-time" type="time">
    </div>
    <div class="form-group">
      <label class="form-label">📍 장소</label>
      <input class="form-input" id="act-location" placeholder="예: 성산일출봉, 강남역 스타벅스..." maxlength="60">
    </div>
    <div class="form-group">
      <label class="form-label">✏️ 메모</label>
      <textarea class="form-input" id="act-memo" rows="3" placeholder="이 순간을 기록해보세요..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">📷 사진</label>
      <label class="photo-upload" for="act-file">사진 추가하기</label>
      <input type="file" id="act-file" accept="image/*" multiple style="display:none">
      <div class="photo-previews" id="act-previews"></div>
    </div>
    <div id="act-save-error" style="display:none;color:#FF453A;font-size:13px;margin-bottom:8px;padding:0 4px"></div>
    <button class="btn-primary" id="act-save-btn" onclick="saveActivity()">기록 저장</button>
  </div>
</div>

<!-- ===== MODAL: ADD EXPENSE ===== -->
<div class="modal-overlay" id="modal-add-expense" onclick="handleOverlayClick(event,'modal-add-expense')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">지출 추가</div>
    <div class="form-group">
      <label class="form-label">항목명 *</label>
      <input class="form-input" id="exp-title" placeholder="예: 점심 식사, 렌트카, 입장료..." maxlength="40">
    </div>
    <div class="form-group">
      <label class="form-label">금액 *</label>
      <input class="form-input" id="exp-amount" type="number" placeholder="0" min="0">
    </div>
    <div class="form-group">
      <label class="form-label">결제한 사람</label>
      <div id="exp-payer"></div>
    </div>
    <div class="form-group">
      <label class="form-label">분담 인원</label>
      <div id="exp-split"></div>
    </div>
    <button class="btn-primary" onclick="saveExpense()">지출 추가</button>
  </div>
</div>

<!-- ===== PHOTO VIEWER ===== -->
<div class="photo-viewer" id="photo-viewer" onclick="closePhotoViewer()">
  <button class="photo-viewer-close" onclick="closePhotoViewer()">✕</button>
  <img id="photo-viewer-img" src="">
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ── SUPABASE ── */
const { createClient } = window.supabase;
const sb = createClient(
  'https://crtzfjdkjfxsaovxiqfv.supabase.co',
  'sb_publishable_1xCXa4J-IJu0x7g4m-yAyw_sKBBhRrS'
);

const AVATAR_COLORS = ['#FFB3B3','#FFCBA4','#FFF0A0','#B5EAC8','#A8E6DF','#B3C8F5','#D4B8F0','#FFB8D9'];
const COVER_EMOJIS = ['📸','🌅','🎉','🍕','🏖️','⛰️','🎮','☕','🎂','🍺','🌸','🏃','🎵','🍜','✈️','🎪','🎸','🏕️','🌃','🎨'];

const state = {
  gatherings: [],
  currentId: null,
  currentTab: 'timeline',
  realtimeChannel: null,
};

/* ── INIT ── */
async function init() {
  buildEmojiGrid();
  await loadFromDB();
  document.getElementById('loading-screen').style.display = 'none';
  if (!handleURLRouting()) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-home').classList.add('active');
  }
}

async function loadFromDB() {
  try {
    const [{ data: gs }, { data: acts }, { data: exps }] = await Promise.all([
      sb.from('gatherings').select('*').order('created_at', { ascending: false }),
      sb.from('activities').select('*'),
      sb.from('expenses').select('*'),
    ]);

    state.gatherings = (gs || []).map(g => ({
      id: g.id,
      title: g.title,
      date: g.date || '',
      location: g.location || '',
      members: g.members || [],
      emoji: g.cover_emoji || '📸',
      coverPhoto: g.cover_photo || '',
      activities: (acts || [])
        .filter(a => a.gathering_id === g.id)
        .map(a => ({ id: a.id, time: a.time || '', location: a.location || '', memo: a.memo || '', photos: a.photos || [] })),
      expenses: (exps || [])
        .filter(e => e.gathering_id === g.id)
        .map(e => ({ id: e.id, title: e.title, amount: e.amount, paidBy: e.paid_by, splitAmong: e.split_among || [] })),
    }));
  } catch(e) {
    showToast('데이터 불러오기 실패. 네트워크를 확인해주세요.');
  }
  renderHome();
}

/* ── URL ROUTING ── */
function handleURLRouting() {
  const gId = new URLSearchParams(location.search).get('g');
  if (gId && state.gatherings.find(g => g.id === gId)) {
    showGathering(gId, false);
    return true;
  }
  return false;
}

window.addEventListener('popstate', () => {
  const gId = new URLSearchParams(location.search).get('g');
  if (gId && state.gatherings.find(g => g.id === gId)) {
    showGathering(gId, false);
  } else {
    showHome(false);
  }
});

/* ── REALTIME ── */
function subscribeToGathering(gId) {
  if (state.realtimeChannel) sb.removeChannel(state.realtimeChannel);

  state.realtimeChannel = sb.channel('room-' + gId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'activities', filter: `gathering_id=eq.${gId}` },
      async (payload) => {
        const g = cur();
        if (!g || g.activities.find(a => a.id === payload.new.id)) return;
        const { data } = await sb.from('activities').select('*').eq('id', payload.new.id).single();
        if (data) {
          g.activities.push({ id: data.id, time: data.time || '', location: data.location || '', memo: data.memo || '', photos: data.photos || [] });
          renderTimeline();
        }
      })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'activities', filter: `gathering_id=eq.${gId}` },
      (payload) => {
        const g = cur();
        if (!g) return;
        g.activities = g.activities.filter(a => a.id !== payload.old.id);
        renderTimeline();
      })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'expenses', filter: `gathering_id=eq.${gId}` },
      async (payload) => {
        const g = cur();
        if (!g || g.expenses.find(e => e.id === payload.new.id)) return;
        const { data } = await sb.from('expenses').select('*').eq('id', payload.new.id).single();
        if (data) {
          g.expenses.push({ id: data.id, title: data.title, amount: data.amount, paidBy: data.paid_by, splitAmong: data.split_among || [] });
          renderSettlement();
        }
      })
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'expenses', filter: `gathering_id=eq.${gId}` },
      (payload) => {
        const g = cur();
        if (!g) return;
        g.expenses = g.expenses.filter(e => e.id !== payload.old.id);
        renderSettlement();
      })
    .subscribe();
}

/* ── SETTLEMENT CALC ── */
function calcSettlement(members, expenses) {
  const paid={}, owes={};
  members.forEach(m=>{ paid[m]=0; owes[m]=0; });
  expenses.forEach(e=>{
    if(paid[e.paidBy]!==undefined) paid[e.paidBy]+=e.amount;
    const share=e.amount/e.splitAmong.length;
    e.splitAmong.forEach(m=>{ if(owes[m]!==undefined) owes[m]+=share; });
  });
  const balance={};
  members.forEach(m=>{ balance[m]=(paid[m]||0)-(owes[m]||0); });
  const debtors=members.filter(m=>balance[m]<-0.5).map(m=>({name:m,amount:-balance[m]})).sort((a,b)=>b.amount-a.amount);
  const creditors=members.filter(m=>balance[m]>0.5).map(m=>({name:m,amount:balance[m]})).sort((a,b)=>b.amount-a.amount);
  const transactions=[];
  let i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    const t=Math.min(debtors[i].amount,creditors[j].amount);
    if(t>0.5) transactions.push({from:debtors[i].name,to:creditors[j].name,amount:t});
    debtors[i].amount-=t; creditors[j].amount-=t;
    if(debtors[i].amount<0.5) i++;
    if(creditors[j].amount<0.5) j++;
  }
  return {balance,transactions};
}

function compressImageFile(file, callback) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  const cleanup = () => URL.revokeObjectURL(url);
  const tryCompress = (quality) => {
    try {
      const MAX = 1080;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const out = canvas.toDataURL('image/jpeg', quality);
      if (out.length > 400000 && quality > 0.3) return tryCompress(quality - 0.1);
      return out && out.length > 100 ? out : null;
    } catch(e) { return null; }
  };
  img.onload = function() { cleanup(); callback(tryCompress(0.75)); };
  img.onerror = function() { cleanup(); callback(null); };
  img.src = url;
}

function handleActivityPhotos(input) {
  if (!input.files || !input.files.length) return;
  Array.from(input.files).forEach(file => {
    compressionCount++;
    updateSaveBtn();
    compressImageFile(file, compressed => {
      if (compressed) pendingPhotos.push(compressed);
      compressionCount--;
      renderPreviews();
      updateSaveBtn();
    });
  });
}

/* ── UTILS ── */
function cur() { return state.gatherings.find(g => g.id === state.currentId); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtMoney(n){ return Math.round(n).toLocaleString('ko-KR')+'원'; }
function fmtDate(d){
  if(!d) return '';
  const [y,m,day]=d.split('-');
  return `${y}년 ${parseInt(m)}월 ${parseInt(day)}일`;
}
function toDay(){ return new Date().toISOString().split('T')[0]; }
function nowTime(){
  const d=new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

init();
